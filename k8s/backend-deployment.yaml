apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd-backend
  template:
    metadata:
      labels:
        app: cicd-backend
    spec:
      containers:
        - name: backend
          image: your-dockerhub-username/cicd-backend:latest
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: cicd-backend-service
spec:
  selector:
    app: cicd-backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
